<!DOCTYPE html>
<html>
<head>
    <title>Forms</title>
</head>
<body>

    <h1>Forms</h1>

    <form>

        <label>Name</label>
        <input type="text" placeholder="Name">
        <br><br>

        <label>Email-Id</label>
        <input type="email" placeholder="Email-Id">
        <br><br>

        <label>Password</label>
        <input type="password" placeholder="Password">
        <br><br><br>

        <p>Language</p>

        <input type="radio" name="lang">HTML<br>
        <input type="radio" name="lang">CSS<br>
        <input type="radio" name="lang">JS

        <br><br>

        <p>Courses</p>

        <input type="checkbox">Java Stack<br>
        <input type="checkbox">Data Science<br>
        <input type="checkbox">MERN Stack

        <br><br>

        <label>Field:</label>
        <br>

        <select>
            <option>Select</option>
            <option>HTML</option>
            <option>CSS</option>
            <option>JavaScript</option>
        </select>

        <br><br><br>

        <textarea rows="8" cols="25"
        placeholder="Describe Yourself"></textarea>

        <br><br>

        <input type="date">

        <br><br>

        <label>Phone No.</label>
        <input type="tel" placeholder="Phone No.">

        <br><br>

        <input type="submit" value="Submit">

    </form>

        Click Here for Table File
    </a>

</body>
</html>
